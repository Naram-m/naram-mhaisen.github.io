bio: |
  Naram is a Postdoctoral Researcher with the [Networked Systems](https://www.tudelft.nl/ewi/over-de-faculteit/afdelingen/software-technology/networked-systems)
  Group at the Faculty of Electrical Engineering, Mathematics, and Computer Science,
  TU Delft, The Netherlands. His research focuses on online learning techniques
  with applications in resource management across communication systems. 
  
  He received the B.Sc. degree in Computer Engineering from Qatar University in
  2017 with the Order of Excellence award, and the M.Sc. degree with Distinction
  in Computing from Qatar University in 2020, supervised by
  Prof. [Mohsen Guizani](https://mbzuai.ac.ae/study/faculty/professor-mohsen-guizani/).
  He completed his Ph.D. at TU Delft in 2025, supervised by
  Dr. [George Iosifidis](https://www.tudelft.nl/en/staff/g.iosifidis/), with a thesis
  on Optimistic Learning with Applications to Caching Networks. 
  
  His work has been
  recognized by the Microsoft Imagine Cup award (2017) and a NEC Europe Research
  Fellowship (2022).

