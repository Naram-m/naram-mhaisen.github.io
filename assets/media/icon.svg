<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black outer half (left) -->
  <path d="M50 0 A50 50 0 0 0 50 100 A25 25 0 0 1 50 50 A25 25 0 0 0 50 0 Z" fill="currentColor"/>
  <!-- White outer half is the page background; we only draw the small dot -->
  <!-- Small white dot inside the black half -->
  <circle cx="50" cy="25" r="6" fill="#ffffff"/>
  <!-- Small black dot inside the white half -->
  <circle cx="50" cy="75" r="6" fill="currentColor"/>
  <!-- Outline -->
  <circle cx="50" cy="50" r="49" fill="none" stroke="currentColor" stroke-width="2"/>
</svg>
